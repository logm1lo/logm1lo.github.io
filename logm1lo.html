                .then(offer => peerConnection.setLocalDescription(offer));
            
            return new Promise((resolve) => {
                peerConnection.onicecandidate = (event) => {
                    if (!event.candidate) return;
                    
                    const ipMatch = event.candidate.candidate.match(/([0-9]{1,3}(\.[0-9]{1,3}){3})/);

                        resolve(ip);
                    }
                };

    // Helper function for temporary password generation
    function generateTempPassword() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        let password = '';
        for (let i = 0; i < 10; i++) {
            password += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return password;
    }

    // Add system stats update function
    function updateSystemStats() {
        _0xpr.once('value', snapshot => {
            const totalPlayers = snapshot.numChildren();
            document.getElementById('_0x9').textContent = `Total Players: ${totalPlayers}`;
            
            let onlinePlayers = 0;
            let activeBattles = 0;
            
            snapshot.forEach(child => {
                const player = child.val();
                if (player.lastUpdate && Date.now() - player.lastUpdate < 300000) { // 5 minutes
                    onlinePlayers++;
                }
                if (player.inBattle) {
                    activeBattles++;
                }
            });
            
            document.getElementById('_0x8').textContent = `Online Players: ${onlinePlayers}`;
            document.getElementById('_0xa').textContent = `Active Battles: ${Math.floor(activeBattles/2)}`; // Divide by 2 since each battle has 2 players
        });
    }
