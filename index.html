<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher's Day Poster</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="poster-container">
        <img id="poster" src="poster.jpg" alt="Teacher's Day Poster">
        <div id="hearts-container"></div>
        <div id="wishes-container"></div>
    </div>
    <div class="live-collaboration">
        <p>Live Users: <span id="liveUserCount">0</span></p>
    </div>
    <button id="wishButton">Send a Wish</button>

    <!-- Popup form container -->
    <div id="wishFormContainer" class="wish-form-container">
        <div class="wish-form">
            <h2>Send Your Wish</h2>
            <input type="text" id="nameInput" placeholder="Your Name" required>
            <input type="text" id="wishInput" placeholder="Your Wish" required>
            <button id="submitWishButton">Submit Wish</button>
            <button id="closeFormButton">Close</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-database-compat.js"></script>
    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyBinhf3-PpbAeQaQKToNnLHBBBxVQeLbp4",
        authDomain: "yayy-93c45.firebaseapp.com",
        databaseURL: "https://yayy-93c45-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yayy-93c45",
        storageBucket: "yayy-93c45.appspot.com",
        messagingSenderId: "281901593072",
        appId: "1:281901593072:web:614dff92e64d25669c6d35",
        measurementId: "G-JB3PWXQ56M"
    };

    firebase.initializeApp(firebaseConfig);

    const db = firebase.database();
    const liveUserRef = db.ref("liveUsers");
    const heartsRef = db.ref("hearts");
    const wishFormContainer = document.querySelector('.wish-form-container');
    const wishButton = document.getElementById('wishButton');
    const closeFormButton = document.getElementById('closeFormButton');

    // Track live users
    const userKey = liveUserRef.push().key;
    liveUserRef.child(userKey).set(true);
    liveUserRef.child(userKey).onDisconnect().remove();

    liveUserRef.on("value", (snapshot) => {
        const liveUserCount = snapshot.numChildren();
        document.getElementById("liveUserCount").textContent = liveUserCount;
    });

    // Wish submission
    document.getElementById("submitWishButton").addEventListener("click", () => {
            const name = document.getElementById("nameInput").value;
            const wish = document.getElementById("wishInput").value;

            if (name && wish) {
                const wishData = {
                    name,
                    text: wish,
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight
                };

                db.ref("wishes").push(wishData)
                    .then(() => {
                        // Display the wish on the screen
                        displayWish(wishData);

                        // Hide form after successful submission
                        wishFormContainer.style.display = "none";

                        // Reset input fields for new input
                        document.getElementById("nameInput").value = "";
                        document.getElementById("wishInput").value = "";
                    })
                    .catch((error) => {
                        console.error("Error submitting wish:", error);
                        alert("Failed to submit your wish. Please try again.");
                    });
            } else {
                alert("Please enter both your name and your wish.");
            }
        });
    // Display wishes
    db.ref("wishes").on("child_added", (snapshot) => {
        const wishData = snapshot.val();
        displayWish(wishData);
    });

    function displayWish(wishData) {
        const wishContainer = document.getElementById("wishes-container");
        const wishElement = document.createElement("div");
        wishElement.className = "wish";
        wishElement.style.top = `${wishData.y}px`;
        wishElement.style.left = `${wishData.x}px`;
        wishElement.innerText = `${wishData.name}: ${wishData.text}`;
        wishContainer.appendChild(wishElement);
    }

    // Live hearts feature
    document.addEventListener('click', function(event) {
        const poster = document.querySelector('.poster-container');
        const rect = poster.getBoundingClientRect();
        const mouseX = event.clientX - rect.left;
        const mouseY = event.clientY - rect.top;

        const heartData = { x: mouseX, y: mouseY };
        heartsRef.push(heartData);
    });

    heartsRef.on("child_added", (snapshot) => {
        const heartData = snapshot.val();
        displayHeart(heartData.x, heartData.y);
    });

    function displayHeart(x, y) {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerText = '💖';
        heart.style.left = `${x}px`;
        heart.style.top = `${y}px`;

        document.getElementById('hearts-container').appendChild(heart);
        setTimeout(() => heart.remove(), 4000);
    }
    </script>
</body>
</html>
