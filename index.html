<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher's Day Poster</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="poster-container">
        <img id="poster" src="poster.jpg" alt="Teacher's Day Poster">
        <div id="hearts-container"></div>
        <div id="wishes-container"></div>
    </div>
    <button id="wishButton">Send a Wish</button>
    <div id="liveUserCounter">Users Online: <span id="userCount">0</span></div>

    <!-- Popup form container -->
    <div id="wishFormContainer" class="wish-form-container">
        <div class="wish-form">
            <h2>Send Your Wish</h2>
            <input type="text" id="nameInput" placeholder="Your Name" required>
            <input type="text" id="wishInput" placeholder="Your Wish" required>
            <button id="submitWishButton">Submit Wish</button>
            <button id="closeFormButton">Close</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-database-compat.js"></script>
    <script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBinhf3-PpbAeQaQKToNnLHBBBxVQeLbp4",
        authDomain: "yayy-93c45.firebaseapp.com",
        databaseURL: "https://yayy-93c45-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yayy-93c45",
        storageBucket: "yayy-93c45.appspot.com",
        messagingSenderId: "281901593072",
        appId: "1:281901593072:web:614dff92e64d25669c6d35",
        measurementId: "G-JB3PWXQ56M"
    };
    firebase.initializeApp(firebaseConfig);

    // Firebase Database References
    const db = firebase.database();
    const wishesRef = db.ref("wishes");
    const userCountRef = db.ref("userCount");

    // Display the last 100 wishes only
    wishesRef.limitToLast(100).on("child_added", (snapshot) => {
        displayWish(snapshot.val());
    });

    // Function to display wishes on the screen
    function displayWish(wishData) {
        const wishContainer = document.getElementById("wishes-container");
        const wishElement = document.createElement("div");
        wishElement.className = "wish";
        wishElement.style.top = `${Math.random() * (window.innerHeight - 50)}px`;
        wishElement.style.left = `${Math.random() * (window.innerWidth - 50)}px`;
        wishElement.innerText = `${wishData.name}: ${wishData.text}`;
        wishContainer.appendChild(wishElement);
    }

    // Prune old wishes to maintain only the latest 100
    function pruneOldWishes() {
        wishesRef.once("value", (snapshot) => {
            const wishes = snapshot.val();
            const keys = Object.keys(wishes);
            if (keys.length > 100) {
                const excessKeys = keys.slice(0, keys.length - 100);
                excessKeys.forEach((key) => wishesRef.child(key).remove());
            }
        });
    }
    setInterval(pruneOldWishes, 24 * 60 * 60 * 1000); // Prune daily

    // Function to show live user count
    let userCount = 0;
    const userId = Math.random().toString(36).substring(2);

    userCountRef.child(userId).set(true);
    userCountRef.on("value", (snapshot) => {
        userCount = snapshot.numChildren();
        document.getElementById("userCount").textContent = userCount;
    });
    window.addEventListener("beforeunload", () => {
        userCountRef.child(userId).remove();
    });

    // Heart animation
    document.addEventListener('click', function(event) {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerText = '💖';
        heart.style.left = `${event.pageX - 15}px`;
        heart.style.top = `${event.pageY - 15}px`;

        document.getElementById('hearts-container').appendChild(heart);

        // Save heart click to Firebase for real-time display
        db.ref("hearts").push({ x: event.pageX, y: event.pageY });

        // Remove heart after animation
        setTimeout(() => {
            heart.remove();
        }, 4000);
    });

    // Real-time hearts from other users
    db.ref("hearts").limitToLast(20).on("child_added", (snapshot) => {
        const heartData = snapshot.val();
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerText = '💖';
        heart.style.left = `${heartData.x - 15}px`;
        heart.style.top = `${heartData.y - 15}px`;
        document.getElementById('hearts-container').appendChild(heart);
        setTimeout(() => heart.remove(), 4000);
    });
    </script>
</body>
</html>
