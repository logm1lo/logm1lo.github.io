<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher's Day Poster</title>
    <link rel="stylesheet" href="styles.css">
    <style>
    .heart {
        position: absolute;
        font-size: 30px;
        z-index: 1;
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
        transition: all 1s cubic-bezier(0.165, 0.84, 0.44, 1);
        pointer-events: none;
        will-change: transform, opacity;
    }

    .milestone-popup {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(255, 255, 255, 0.95);
        padding: 20px 30px;
        border-radius: 15px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        z-index: 2001;
        animation: popupFade 5s ease-in-out forwards;
    }

    .milestone-content {
        font-size: 24px;
        text-align: center;
        white-space: nowrap;
    }

    @keyframes popupFade {
        0% { opacity: 0; transform: translate(-50%, -40%); }
        10% { opacity: 1; transform: translate(-50%, -50%); }
        90% { opacity: 1; transform: translate(-50%, -50%); }
        100% { opacity: 0; transform: translate(-50%, -60%); }
    }
    </style>
</head>
<body>
    <div class="cps-counter">
        <div class="cps-current">Current CPS: <span id="currentCPS">0</span></div>
        <div class="cps-peak">Peak CPS: <span id="peakCPS">0</span></div>
    </div>
    
    <div class="poster-container">
        <img id="poster" src="poster.jpg" alt="Teacher's Day Poster">
        <div id="hearts-container"></div>
        <div id="wishes-container"></div>
    </div>
    
    <div class="live-collaboration">
        <p>Live Users: <span id="liveUserCount">0</span></p>
    </div>
    
    <div class="scoreboard">
        <h2>Top Clickers 🏆</h2>
        <div id="scoreList"></div>
    </div>
    
    <div id="namePromptContainer" class="name-prompt-container">
        <div class="name-prompt">
            <h2>Enter Your Name</h2>
            <input type="text" id="playerNameInput" placeholder="Your Name (max 12 chars)" maxlength="12" required>
            <p id="nameError" class="error-message"></p>
            <button id="submitNameButton">Start Clicking!</button>
        </div>
    </div>
    
    <button id="wishButton">Send a Wish</button>

    <div id="wishFormContainer" class="wish-form-container">
        <div class="wish-form">
            <h2>Send Your Wish</h2>
            <input type="text" id="nameInput" placeholder="Your Name" required>
            <input type="text" id="wishInput" placeholder="Your Wish" required>
            <button id="submitWishButton">Submit Wish</button>
            <button id="closeFormButton">Close</button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-database-compat.js"></script>

    <script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBinhf3-PpbAeQaQKToNnLHBBBxVQeLbp4",
        authDomain: "yayy-93c45.firebaseapp.com",
        databaseURL: "https://yayy-93c45-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yayy-93c45",
        storageBucket: "yayy-93c45.appspot.com",
        messagingSenderId: "281901593072",
        appId: "1:281901593072:web:614dff92e64d25669c6d35"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Global references
    const playersRef = db.ref('players');
    const wishesRef = db.ref('wishes');
    const liveUserRef = db.ref('liveUsers');
    const clicksRef = db.ref('clicks');

    // Global variables
    let playerName = '';
    let userKey = liveUserRef.push().key;
    let clickTimes = [];
    let peakCPS = 0;
    let lastProcessedClick = 0;
    const MIN_CLICK_INTERVAL = 16; // About 60fps
    let scoreboardListener;
    let cpsUpdateFrame = null;
    let lastWishTime = 0;
    const MIN_WISH_INTERVAL = 5000; // 5 seconds between wishes

    // Milestones
    const MILESTONES = {
        500: "🌟 Great start! 500 hearts achieved!",
        1000: "🎉 Amazing! You've reached 1,000 hearts!",
        1200: "⭐ Fantastic! 1,200 hearts milestone!",
        1400: "🌈 Wonderful! 1,400 hearts reached!",
        1600: "✨ Brilliant! 1,600 hearts collected!",
        1800: "🎯 Impressive! 1,800 hearts achieved!",
        2000: "🏆 Outstanding! 2,000 hearts mastered!",
        2500: "💫 Phenomenal! 2,500 hearts conquered!",
        3000: "🌠 Incredible! 3,000 hearts milestone!",
        4000: "🎪 Spectacular! 4,000 hearts achieved!",
        5000: "👑 Legendary! 5,000 hearts mastered!",
        7500: "⚡ Extraordinary! 7,500 hearts reached!",
        10000: "🔥 Mythical! 10,000 hearts conquered!",
        15000: "🌌 Cosmic! 15,000 hearts achieved!",
        20000: "💎 Divine! 20,000 hearts mastered!",
        25000: "🎭 Epic! 25,000 hearts milestone!",
        30000: "🏰 Majestic! 30,000 hearts reached!",
        40000: "⚔️ Heroic! 40,000 hearts conquered!",
        50000: "🔮 Mystical! 50,000 hearts achieved!",
        75000: "🌋 Godlike! 75,000 hearts mastered!",
        99999: "👑 MAXIMUM POWER! 99,999 hearts!"
    };

    document.addEventListener('DOMContentLoaded', function() {
        // Initialize live user tracking
        liveUserRef.child(userKey).set(true);
        liveUserRef.child(userKey).onDisconnect().remove();

        // Update live user count
        liveUserRef.on('value', (snapshot) => {
            document.getElementById('liveUserCount').textContent = snapshot.numChildren();
        });

        // Handle name submission with better error handling
        document.getElementById('submitNameButton').addEventListener('click', async () => {
            console.log('Submit button clicked'); // Debug log
            
            const nameInput = document.getElementById('playerNameInput');
            const name = nameInput.value.trim();
            const nameError = document.getElementById('nameError');
            
            if (!name) {
                nameError.textContent = 'Please enter a name';
                return;
            }

            if (name.length > 12) {
                nameError.textContent = 'Name must be 12 characters or less';
                return;
            }
            
            try {
                // Check for existing name
                const snapshot = await playersRef.orderByChild('name').equalTo(name).once('value');
                if (snapshot.exists()) {
                    nameError.textContent = 'Name already taken';
                    return;
                }
                
                // Set player name
                playerName = name;
                
                // Register player with IP
                try {
                    const ipResponse = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipResponse.json();
                    
                    await playersRef.child(userKey).set({
                        name: playerName,
                        hearts: 0,
                        ip: ipData.ip,
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    });

                    // Hide name prompt and initialize game
                    document.getElementById('namePromptContainer').style.display = 'none';
                    initializeGame();
                    
                    console.log('Player registered successfully'); // Debug log
                } catch (error) {
                    // Fallback if IP fetch fails
                    await playersRef.child(userKey).set({
                        name: playerName,
                        hearts: 0,
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    });

                    // Hide name prompt and initialize game
                    document.getElementById('namePromptContainer').style.display = 'none';
                    initializeGame();
                }
            } catch (error) {
                console.error('Error registering player:', error);
                nameError.textContent = 'Error saving name. Please try again.';
            }
        });

        // Initialize wish system
        const wishButton = document.getElementById('wishButton');
        const submitWishButton = document.getElementById('submitWishButton');
        const closeFormButton = document.getElementById('closeFormButton');

        wishButton.addEventListener('click', () => {
            document.getElementById('wishFormContainer').style.visibility = 'visible';
        });

        submitWishButton.addEventListener('click', submitWish);

        closeFormButton.addEventListener('click', () => {
            document.getElementById('wishFormContainer').style.visibility = 'hidden';
        });

        // Initialize wishes display - fetch existing wishes
        wishesRef.orderByChild('timestamp').limitToLast(50).once('value', (snapshot) => {
            snapshot.forEach((child) => {
                displayWish(child.val());
            });
        });

        // Listen for new wishes
        wishesRef.orderByChild('timestamp').startAfter(Date.now()).on('child_added', (snapshot) => {
            displayWish(snapshot.val());
        });
    });

    // Initialize game function with error handling
    function initializeGame() {
        console.log('Initializing game'); // Debug log
        
        const posterContainer = document.querySelector('.poster-container');
        if (posterContainer) {
            posterContainer.addEventListener('click', handleClick);
            console.log('Click handler attached');
        } else {
            console.error('Poster container not found');
        }
        
        // Start scoreboard updates
        scoreboardListener = playersRef.orderByChild('hearts').on('value', updateScoreboard);
        
        // Start CPS counter
        startCPSUpdater();
        
        console.log('Game initialized successfully');
    }

    // Optimized click handler
    async function handleClick(event) {
        if (!playerName) return;
        
        const now = performance.now();
        if (now - lastProcessedClick < MIN_CLICK_INTERVAL) return; // Throttle clicks
        lastProcessedClick = now;
        
        try {
            // Add click to times array
            clickTimes.push(now);
            
            // Update score in Firebase
            const updates = {
                hearts: firebase.database.ServerValue.increment(1),
                lastUpdate: firebase.database.ServerValue.TIMESTAMP
            };
            
            await playersRef.child(userKey).update(updates);
            
            // Display heart animation
            displayHeart(event);
            
            // Check milestone (get current score first)
            const snapshot = await playersRef.child(userKey).once('value');
            const currentScore = snapshot.val()?.hearts || 0;
            checkMilestone(currentScore);
            
        } catch (error) {
            console.error('Error updating score:', error);
        }
    }

    // Optimized CPS counter
    function startCPSUpdater() {
        let frameCount = 0;
        const MAX_FRAMES = 60;
        const frameData = new Array(MAX_FRAMES).fill(0);
        
        function updateCPS() {
            const now = performance.now();
            const oneSecondAgo = now - 1000;
            
            // Remove old clicks
            clickTimes = clickTimes.filter(time => time > oneSecondAgo);
            
            // Calculate current CPS
            const currentCPS = clickTimes.length;
            
            // Update frame data
            frameData[frameCount % MAX_FRAMES] = currentCPS;
            frameCount++;
            
            // Calculate average CPS
            const avgCPS = Math.round(currentCPS * 10) / 10;
            
            // Update display
            const currentCPSElement = document.getElementById('currentCPS');
            const peakCPSElement = document.getElementById('peakCPS');
            
            if (currentCPSElement) currentCPSElement.textContent = avgCPS.toFixed(1);
            
            // Update peak CPS
            if (avgCPS > peakCPS && peakCPSElement) {
                peakCPS = avgCPS;
                peakCPSElement.textContent = peakCPS.toFixed(1);
            }
            
            cpsUpdateFrame = requestAnimationFrame(updateCPS);
        }
        
        cpsUpdateFrame = requestAnimationFrame(updateCPS);
    }

    // Optimized heart display
    function displayHeart(event) {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerHTML = '💖';
        
        const rect = event.target.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        
        heart.style.cssText = `
            left: ${x}px;
            top: ${y}px;
            will-change: transform, opacity;
        `;
        
        const container = document.getElementById('hearts-container');
        container.appendChild(heart);
        
        // Use requestAnimationFrame for smoother removal
        requestAnimationFrame(() => {
            heart.style.opacity = '0';
            heart.style.transform = 'translate(-50%, -150%) scale(0.5)';
            setTimeout(() => {
                container.removeChild(heart);
            }, 1000);
        });
    }

    function checkMilestone(score) {
        const milestone = Object.entries(MILESTONES).find(([threshold]) => score === parseInt(threshold));
        if (milestone) {
            const popup = document.createElement('div');
            popup.className = 'milestone-popup';
            popup.innerHTML = `<div class="milestone-content">${milestone[1]}</div>`;
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 5000);
        }
    }

    function updateScoreboard(snapshot) {
        const scoreList = document.getElementById('scoreList');
        const scores = [];
        
        snapshot.forEach((child) => {
            const data = child.val();
            if (data.name && typeof data.hearts === 'number') {
                scores.push({
                    key: child.key,
                    name: data.name,
                    hearts: data.hearts
                });
            }
        });
        
        scores.sort((a, b) => b.hearts - a.hearts);
        
        scoreList.innerHTML = scores.map((score, index) => {
            let rankDisplay;
            if (index === 0) rankDisplay = '🥇';
            else if (index === 1) rankDisplay = '🥈';
            else if (index === 2) rankDisplay = '🥉';
            else rankDisplay = `${index + 1}.`;
            
            const isCurrentPlayer = score.key === userKey;
            
            return `
                <div class="score-item ${index < 3 ? 'top-three' : ''}" 
                     data-player="${score.name}"
                     data-current="${isCurrentPlayer}">
                    <span class="player-rank">${rankDisplay}</span>
                    <span class="player-name">${score.name}</span>
                    <span class="player-score">${score.hearts} 💖</span>
                </div>
            `;
        }).join('');
    }

    async function submitWish(event) {
        event.preventDefault();
        
        const now = Date.now();
        if (now - lastWishTime < MIN_WISH_INTERVAL) {
            alert('Please wait a few seconds before sending another wish');
            return;
        }
        
        const nameInput = document.getElementById('nameInput');
        const wishInput = document.getElementById('wishInput');
        const name = nameInput.value.trim();
        const wish = wishInput.value.trim();
        
        if (!name || !wish) {
            alert('Please enter both name and wish');
            return;
        }
        
        if (wish.length > 100) { // Add length limit
            alert('Wish must be 100 characters or less');
            return;
        }
        
        try {
            // Calculate random position within visible area
            const containerRect = document.querySelector('.poster-container').getBoundingClientRect();
            const maxWidth = containerRect.width - 200;
            const maxHeight = containerRect.height - 100;
            
            const wishData = {
                name: name,
                text: wish,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                x: Math.random() * maxWidth,
                y: Math.random() * maxHeight
            };
            
            // Save to database
            await wishesRef.push(wishData);
            
            // Display immediately without waiting for the database event
            displayWish({
                ...wishData,
                timestamp: Date.now() // Use current time for immediate display
            });
            
            // Clear form and hide
            nameInput.value = '';
            wishInput.value = '';
            document.getElementById('wishFormContainer').style.visibility = 'hidden';
            lastWishTime = now;
        } catch (error) {
            console.error('Error saving wish:', error);
            alert('Error saving wish. Please try again later.');
        }
    }

    function displayWish(wishData) {
        try {
            const wishElement = document.createElement('div');
            wishElement.className = 'wish';
            
            // Ensure container exists
            const container = document.querySelector('.poster-container');
            const wishesContainer = document.getElementById('wishes-container');
            if (!container || !wishesContainer) {
                console.error('Required containers not found');
                return;
            }
            
            // Ensure position is within container bounds
            const containerRect = container.getBoundingClientRect();
            const maxX = Math.max(0, containerRect.width - 200);
            const maxY = Math.max(0, containerRect.height - 100);
            
            const x = Math.min(Math.max(0, wishData.x || 0), maxX);
            const y = Math.min(Math.max(0, wishData.y || 0), maxY);
            
            wishElement.style.left = `${x}px`;
            wishElement.style.top = `${y}px`;
            wishElement.textContent = `${wishData.name || 'Anonymous'}: ${wishData.text || ''}`;
            
            wishesContainer.appendChild(wishElement);
            
            // Add animation classes
            requestAnimationFrame(() => {
                wishElement.classList.add('show');
            });
            
            // Remove after animation
            setTimeout(() => {
                wishElement.classList.add('fade-out');
                setTimeout(() => {
                    if (wishElement.parentNode) {
                        wishElement.remove();
                    }
                }, 1000);
            }, 4000);
        } catch (error) {
            console.error('Error displaying wish:', error);
        }
    }

    // Cleanup function
    function cleanup() {
        if (scoreboardListener) {
            playersRef.off('value', scoreboardListener);
        }
        if (cpsUpdateFrame) {
            cancelAnimationFrame(cpsUpdateFrame);
        }
        wishesRef.off(); // Remove all wish listeners
        liveUserRef.off();
    }

    window.addEventListener('beforeunload', cleanup);

    async function registerPlayer(name) {
        try {
            const ipResponse = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipResponse.json();
            
            await playersRef.child(userKey).set({
                name: name,
                hearts: 0,
                ip: ipData.ip,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
        } catch (error) {
            console.error('Error registering player:', error);
        }
    }
    </script>
</body>
</html>
