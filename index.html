    function processClickBuffer() {

            if (scoreElement) {

                    for (let i = 0; i < items.length; i++) {

                            scoreList.insertBefore(scoreElement, items[i]);

                    items.forEach((item, index) => {
                        const rankElement = item.querySelector('.player-rank');

        );
