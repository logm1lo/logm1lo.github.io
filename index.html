        submitWishButton.addEventListener("click", () => {

            const wish = wishInput.value.trim();

            if (name && wish) {
                if (containsOffensiveWords(wish)) {
                    alert("Your wish contains inappropriate content. Please edit and try again.");
                    return;
                }

                const wishData = {
                    name,
                    text: wish,
                    x: Math.random() * poster.offsetWidth,
                    y: Math.random() * poster.offsetHeight

                db.ref("wishes").push(wishData);

        // Function to check if the wish contains offensive words
        function containsOffensiveWords(wishText) {
            // Trim leading/trailing spaces and convert to lowercase for case-insensitive comparison
            const normalizedWishText = wishText.trim().toLowerCase();

            // Check if any offensive word appears in the wish text
            for (const word of offensiveWords) {
                if (normalizedWishText.includes(word.toLowerCase())) {
                    console.log(`Offensive word found: ${word}`); // Debugging line
                    return true;
                }
            }
            return false;
        }


        function displayWish(wishData) {
            const wishElement = document.createElement("div");
            wishElement.className = "wish";
            wishElement.style.top = `${wishData.y}px`;
            wishElement.style.left = `${wishData.x}px`;
            wishElement.innerText = `${wishData.name}: ${wishData.text}`;
            wishesContainer.appendChild(wishElement);
        }

        db.ref("wishes").on("child_added", (snapshot) => {
            const wishData = snapshot.val();
            displayWish(wishData);
        });

        document.addEventListener('click', function(event) {
            const rect = poster.getBoundingClientRect();
            const mouseX = event.clientX - rect.left;
            const mouseY = event.clientY - rect.top;

            if (mouseX >= 0 && mouseX <= rect.width && mouseY >= 0 && mouseY <= rect.height) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerText = '💖';
                heart.style.left = `${mouseX - 15}px`;
                heart.style.top = `${mouseY - 15}px`;
                heartsContainer.appendChild(heart);
                setTimeout(() => {
                    heart.remove();
                }, 4000);
            }
        });
