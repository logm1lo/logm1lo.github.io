<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher's Day Poster</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="poster-container">
        <img id="poster" src="poster.jpg" alt="Teacher's Day Poster">
        <div id="hearts-container"></div>
        <div id="wishes-container"></div>
    </div>
    <div class="live-collaboration">
        <p>Live Users: <span id="liveUserCount">0</span></p>
    </div>
    <div class="scoreboard">
        <h2>Top Clickers 🏆</h2>
        <div id="scoreList"></div>
    </div>
    <div id="namePromptContainer" class="name-prompt-container">
        <div class="name-prompt">
            <h2>Enter Your Name</h2>
            <input type="text" id="playerNameInput" placeholder="Your Name (max 12 chars)" maxlength="12" required>
            <p id="nameError" class="error-message"></p>
            <button id="submitNameButton">Start Clicking!</button>
        </div>
    </div>
    <button id="wishButton">Send a Wish</button>

    <!-- Popup form container -->
    <div id="wishFormContainer" class="wish-form-container">
        <div class="wish-form">
            <h2>Send Your Wish</h2>
            <input type="text" id="nameInput" placeholder="Your Name" required>
            <input type="text" id="wishInput" placeholder="Your Wish" required>
            <button id="submitWishButton">Submit Wish</button>
            <button id="closeFormButton">Close</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-database-compat.js"></script>
    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyBinhf3-PpbAeQaQKToNnLHBBBxVQeLbp4",
        authDomain: "yayy-93c45.firebaseapp.com",
        databaseURL: "https://yayy-93c45-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yayy-93c45",
        storageBucket: "yayy-93c45.appspot.com",
        messagingSenderId: "281901593072",
        appId: "1:281901593072:web:614dff92e64d25669c6d35",
        measurementId: "G-JB3PWXQ56M"
    };

    firebase.initializeApp(firebaseConfig);

    const db = firebase.database();
    const wishFormContainer = document.querySelector('.wish-form-container');
    const wishButton = document.getElementById('wishButton');
    const closeFormButton = document.getElementById('closeFormButton');

    // Configuration constants
    const MAX_HEARTS = 20;
    const WISH_DISPLAY_TIME = 5000;
    const HEART_DISPLAY_TIME = 3500;
    const CLEANUP_INTERVAL = 60000;
    const MAX_NAME_LENGTH = 12;
    window.MAX_CLICKS_PER_INTERVAL = 30;
    window.RATE_LIMIT_INTERVAL = 16; 
    window.CLICK_BUFFER_SIZE = 50;
    window.SCORE_CHANGE_THRESHOLD = 40;
    const SUSPICIOUS_ACTIVITY_THRESHOLD = 3;
    const SCORE_CHECK_INTERVAL = 2000;

    // Game configuration constants
    window.MAX_CLICKS_PER_INTERVAL = 20;
    window.RATE_LIMIT_INTERVAL = 1000;
    window.CLICK_BUFFER_SIZE = 25;
    window.SCORE_CHANGE_THRESHOLD = 40;
    window.SUSPICIOUS_ACTIVITY_THRESHOLD = 3;
    window.SCORE_CHECK_INTERVAL = 2000;

    // Global variables
    let playerName = '';
    window.lastClickTime = 0;
    window.clickCount = 0;
    window.clickBuffer = [];
    window.clickProcessingInterval = null;
    window.playerScores = new Map();
    window.suspiciousActivity = new Map();

    // Initialize element cache
    const elementCache = new Map();

    // Move createElement function before it's used
    function createElement(className) {
        if (!elementCache.has(className)) {
            elementCache.set(className, document.createElement('div'));
        }
        return elementCache.get(className).cloneNode();
    }

    // Initialize Firebase references
    const wishesRef = db.ref("wishes");
    const heartsRef = db.ref("hearts");
    const liveUserRef = db.ref("liveUsers");
    const playersRef = db.ref("players");
    const clicksRef = db.ref("clicks");

    // Change this line from const to let
    let userKey = liveUserRef.push().key;  // Make userKey reassignable

    // Now initialize live user tracking
    liveUserRef.child(userKey).set(true);
    liveUserRef.child(userKey).onDisconnect().remove();

    // Initialize listener variables
    let wishesListener = null;
    let heartsListener = null;
    let liveUserListener = null;

    // Add this after Firebase initialization and before other code
    const MAX_RECONNECT_ATTEMPTS = 5;
    let reconnectAttempts = 0;
    let isInitialConnection = true;

    // Connection state monitoring
    const connectedRef = db.ref('.info/connected');
    connectedRef.on('value', (snap) => {
        if (snap.val() === true) {
            console.log('Connected to Firebase');
            reconnectAttempts = 0;
            isInitialConnection = false;
        } else {
            console.log('Disconnected from Firebase');
            // Only handle disconnection if it's not the initial connection attempt
            if (!isInitialConnection) {
                handleDisconnection();
            }
        }
    });

    // Update the handleDisconnection function
    function handleDisconnection() {
        if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
            console.error('Max reconnection attempts reached');
            alert('Connection lost. Please refresh the page.');
            return;
        }

        reconnectAttempts++;
        console.log(`Attempting to reconnect... (Attempt ${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})`);
        
        // Attempt to reconnect after a delay with exponential backoff
        setTimeout(() => {
            reconnectToFirebase();
        }, Math.min(1000 * Math.pow(2, reconnectAttempts), 10000));
    }

    // Update the reconnection function
    function reconnectToFirebase() {
        try {
            // Only cleanup and reinitialize if we're not already connected
            if (!firebase.database().ref('.info/connected').key) {
                cleanup();
                firebase.database().goOnline();
                setTimeout(() => {
                    initializeListeners();
                }, 1000);
            }
        } catch (error) {
            console.error('Reconnection failed:', error);
            handleDisconnection();
        }
    }

    // Update the cleanup function
    function cleanup() {
        try {
            if (wishesListener) {
                wishesRef.off('child_added', wishesListener);
                wishesListener = null;
            }
            if (heartsListener) {
                heartsRef.off('child_added', heartsListener);
                heartsListener = null;
            }
            if (liveUserListener) {
                liveUserRef.off('value', liveUserListener);
                liveUserListener = null;
            }
            if (userKey && playerName) {
                // Update last seen timestamp instead of removing the player
                playersRef.child(userKey).update({
                    lastSeen: firebase.database.ServerValue.TIMESTAMP,
                    online: false
                });
            }
            if (clickProcessingInterval) {
                clearInterval(clickProcessingInterval);
                clickProcessingInterval = null;
            }
            clickBuffer = [];
        } catch (error) {
            console.error('Error during cleanup:', error);
        }
    }

    // Update initializeListeners with connection handling
    function initializeListeners() {
        try {
            // Add connection state listener
            const connectedRef = firebase.database().ref('.info/connected');
            connectedRef.on('value', (snap) => {
                const liveUserCount = document.getElementById("liveUserCount");
                if (liveUserCount) {
                    if (snap.val() === true) {
                        liveUserCount.style.color = '#4CAF50'; // Green when connected
                    } else {
                        liveUserCount.style.color = '#f44336'; // Red when disconnected
                    }
                }
            });

            // Live users listener
            liveUserListener = liveUserRef.on("value", (snapshot) => {
                const liveUserCount = document.getElementById("liveUserCount");
                if (liveUserCount) {
                    liveUserCount.textContent = snapshot.numChildren();
                }
            }, (error) => {
                console.error("Error in live user listener:", error);
            });

            // Wishes listener with throttling
            wishesListener = wishesRef.on("child_added", (snapshot) => {
                requestAnimationFrame(() => displayWish(snapshot.val()));
            }, (error) => {
                console.error("Error in wishes listener:", error);
                // Attempt to reconnect after error
                setTimeout(() => {
                    if (wishesListener === null) {
                        initializeListeners();
                    }
                }, 5000);
            });

            // Hearts listener with throttling
            heartsListener = heartsRef.on("child_added", (snapshot) => {
                const heartData = snapshot.val();
                requestAnimationFrame(() => displayHeart(heartData.xRatio, heartData.yRatio));
            }, (error) => {
                console.error("Error in hearts listener:", error);
                // Attempt to reconnect after error
                setTimeout(() => {
                    if (heartsListener === null) {
                        initializeListeners();
                    }
                }, 5000);
            });
        } catch (error) {
            console.error("Error initializing listeners:", error);
            setTimeout(initializeListeners, 5000);
        }
    }

    // Initialize listeners
    initializeListeners();

    // Add cleanup on page unload
    window.addEventListener('unload', cleanup);

    // Optimize wish form handling
    const wishForm = {
        container: document.getElementById('wishFormContainer'),
        nameInput: document.getElementById('nameInput'),
        wishInput: document.getElementById('wishInput'),
        
        init() {
            if (!this.container || !this.nameInput || !this.wishInput) {
                console.error('Required form elements not found');
                return false;
            }
            return true;
        },
        
        show() {
            if (!this.init()) return;
            this.container.style.visibility = 'visible';
            requestAnimationFrame(() => this.container.classList.add('show'));
        },
        
        hide() {
            if (!this.init()) return;
            this.container.style.visibility = 'hidden';
            this.container.classList.remove('show');
            this.nameInput.value = '';
            this.wishInput.value = '';
        },
        
        async submitWish() {
            if (!this.init()) return;
            const name = this.nameInput.value.trim();
            const wish = this.wishInput.value.trim();
            
            if (!name || !wish) {
                alert("Please enter both your name and your wish.");
                return;
            }
            
            try {
                const margin = 0.15;
                const wishData = {
                    name,
                    text: wish,
                    xRatio: margin + (Math.random() * (1 - 2 * margin)),
                    yRatio: margin + (Math.random() * (1 - 2 * margin)),
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                };
                
                await wishesRef.push(wishData);
                this.hide();
            } catch (error) {
                console.error("Error saving wish:", error);
                alert("Failed to save your wish. Please try again.");
            }
        }
    };

    // Add this after the wishForm object definition
    document.getElementById("submitWishButton").addEventListener("click", () => {
        wishForm.submitWish();
    });

    // Optimize wish display
    function displayWish(wishData) {
        const wishContainer = document.getElementById("wishes-container");
        const wishElement = createElement('wish');
        wishElement.className = 'wish';
        
        const xPos = (wishData.xRatio * wishContainer.offsetWidth);
        const yPos = (wishData.yRatio * wishContainer.offsetHeight);
        
        wishElement.style.cssText = `
            left: ${xPos}px;
            top: ${yPos}px;
        `;
        
        wishElement.textContent = `${wishData.name}: ${wishData.text}`;
        wishContainer.appendChild(wishElement);
        
        requestAnimationFrame(() => wishElement.classList.add('show'));

        setTimeout(() => {
            wishElement.classList.add('fade-out');
            setTimeout(() => wishElement.remove(), 1000);
        }, WISH_DISPLAY_TIME);
    }

    // Add this function to validate names
    function validateName(name) {
        const sanitizedName = name.trim();
        if (!sanitizedName) return { valid: false, message: "Name cannot be empty" };
        if (sanitizedName.length > 12) return { valid: false, message: "Name too long" };
        if (!/^[a-zA-Z0-9\s-_]+$/.test(sanitizedName)) return { valid: false, message: "Only letters, numbers, spaces, - and _ allowed" };
        return { valid: true, sanitizedName };
    }

    // Add these functions after Firebase initialization

    // Function to load existing player data
    function loadPlayerData() {
        const savedUserKey = localStorage.getItem('userKey');
        const savedPlayerName = localStorage.getItem('playerName');
        const savedHearts = localStorage.getItem('playerHearts');
        
        if (savedUserKey && savedPlayerName) {
            return playersRef.child(savedUserKey).once('value')
                .then((snapshot) => {
                    if (snapshot.exists() && snapshot.val().name === savedPlayerName) {
                        // This is the same player, restore their session
                        userKey = savedUserKey;
                        playerName = savedPlayerName;
                        
                        return playersRef.child(userKey).update({
                            lastSeen: firebase.database.ServerValue.TIMESTAMP,
                            online: true,
                            restored: true
                        });
                    } else {
                        // Check if the name exists under a different key
                        return playersRef.orderByChild('name').equalTo(savedPlayerName).once('value')
                            .then((nameSnapshot) => {
                                if (nameSnapshot.exists()) {
                                    localStorage.removeItem('userKey');
                                    localStorage.removeItem('playerName');
                                    localStorage.removeItem('playerHearts');
                                    return false;
                                } else {
                                    userKey = playersRef.push().key;  // Generate new key
                                    playerName = savedPlayerName;
                                    
                                    return playersRef.child(userKey).set({
                                        name: playerName,
                                        hearts: parseInt(savedHearts) || 0,
                                        timestamp: firebase.database.ServerValue.TIMESTAMP,
                                        lastSeen: firebase.database.ServerValue.TIMESTAMP,
                                        online: true,
                                        restored: true
                                    }).then(() => {
                                        localStorage.setItem('userKey', userKey);
                                        return true;
                                    });
                                }
                            });
                    }
                })
                .then((success) => {
                    if (success) {
                        playersRef.child(userKey).on('value', (snapshot) => {
                            if (snapshot.exists()) {
                                const data = snapshot.val();
                                localStorage.setItem('playerHearts', data.hearts || 0);
                            }
                        });
                    }
                    return success;
                })
                .catch((error) => {
                    console.error("Error loading player data:", error);
                    localStorage.removeItem('userKey');
                    localStorage.removeItem('playerName');
                    localStorage.removeItem('playerHearts');
                    return false;
                });
        }
        return Promise.resolve(false);
    }

    // Add this function to handle session expiry
    function checkSessionValidity() {
        if (userKey && playerName) {
            playersRef.child(userKey).once('value')
                .then((snapshot) => {
                    if (!snapshot.exists() || snapshot.val().name !== playerName) {
                        // Session is invalid, clear it
                        localStorage.removeItem('userKey');
                        localStorage.removeItem('playerName');
                        localStorage.removeItem('playerHearts');
                        window.location.reload(); // Reload to show name prompt
                    }
                });
        }
    }

    // Add periodic session check
    setInterval(checkSessionValidity, 5 * 60 * 1000); // Check every 5 minutes

    // Update the cleanup function to preserve session
    function cleanup() {
        try {
            if (wishesListener) {
                wishesRef.off('child_added', wishesListener);
                wishesListener = null;
            }
            if (heartsListener) {
                heartsRef.off('child_added', heartsListener);
                heartsListener = null;
            }
            if (liveUserListener) {
                liveUserRef.off('value', liveUserListener);
                liveUserListener = null;
            }
            clicksRef.off('child_added');
            
            if (userKey && playerName) {
                // Update last seen timestamp but keep the player data
                playersRef.child(userKey).update({
                    lastSeen: firebase.database.ServerValue.TIMESTAMP,
                    online: false
                }).catch(error => {
                    console.error('Error updating player status:', error);
                });
            }
            if (clickProcessingInterval) {
                clearInterval(clickProcessingInterval);
                clickProcessingInterval = null;
            }
            clickBuffer = [];
        } catch (error) {
            console.error('Error during cleanup:', error);
        }
    }

    // Add window beforeunload handler to save state
    window.addEventListener('beforeunload', () => {
        if (userKey && playerName) {
            // Sync final state to localStorage
            playersRef.child(userKey).once('value')
                .then(snapshot => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        localStorage.setItem('playerHearts', data.hearts || 0);
                    }
                });
        }
    });

    // Add periodic cleanup for very old players (optional)
    setInterval(() => {
        playersRef.once('value')
            .then((snapshot) => {
                const updates = {};
                const twentyFourHoursAgo = Date.now() - (24 * 60 * 60 * 1000);
                
                snapshot.forEach((child) => {
                    const playerData = child.val();
                    const lastSeen = playerData.lastSeen || playerData.timestamp || 0;
                    
                    if (lastSeen < twentyFourHoursAgo) {
                        updates[child.key] = null;
                    }
                });
                
                if (Object.keys(updates).length > 0) {
                    playersRef.update(updates);
                }
            });
    }, 6 * 60 * 1000); // Check every hour
    // Click tracking variables and constants with optimized values
    let MAX_CLICKS_PER_INTERVAL = 20; // Increased from 12 to 20 clicks per interval
    let RATE_LIMIT_INTERVAL = 1000; // Increased from 300ms to 1000ms for better averaging 
    let CLICK_BUFFER_SIZE = 25; // Increased from 15 to 25
    let SCORE_CHANGE_THRESHOLD = 40; // Increased from 25 to 40

    // Add these new variables for click tracking
    let clickBuffer = [];
    let clickProcessingInterval;

    // Replace the existing click handler with this optimized version
    document.querySelector('.poster-container').addEventListener('click', function(event) {
        if (!playerName) return; // Don't allow clicks without a name

        const currentTime = Date.now();
        const rect = this.getBoundingClientRect();
        const relativeX = (event.clientX - rect.left) / rect.width;
        const relativeY = (event.clientY - rect.top) / rect.height;

        if (relativeX >= 0 && relativeX <= 1 && relativeY >= 0 && relativeY <= 1) {
            // Add click to real-time tracking
            clicksRef.push({
                player: playerName,
                xRatio: relativeX,
                yRatio: relativeY,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            // Add click to buffer for scoring
            clickBuffer.push({
                xRatio: relativeX,
                yRatio: relativeY,
                timestamp: currentTime
            });

            // Display heart immediately for responsive feedback
            displayHeart(relativeX, relativeY);

            // Start processing interval if not already started
            if (!clickProcessingInterval) {
                clickProcessingInterval = setInterval(processClickBuffer, RATE_LIMIT_INTERVAL);
            }
        }
    });

    // Replace all processClickBuffer functions with this single version
    function processClickBuffer() {
        if (!userKey || !playerName) {
            clearInterval(clickProcessingInterval);
            clickProcessingInterval = null;
            clickBuffer = [];
            return;
        }

        const currentTime = Date.now();
        const validClicks = clickBuffer.filter(click => 
            currentTime - click.timestamp <= RATE_LIMIT_INTERVAL
        ).slice(0, MAX_CLICKS_PER_INTERVAL);

        if (validClicks.length > 0) {
            const scoreElement = document.querySelector(`.score-item[data-player="${playerName}"]`);
            if (scoreElement) {
                const scoreDisplay = scoreElement.querySelector('.player-score');
                const currentScore = parseInt(scoreDisplay.getAttribute('data-score') || '0');
                const newScore = currentScore + validClicks.length;

                // Update UI instantly
                requestAnimationFrame(() => {
                    scoreDisplay.setAttribute('data-score', newScore);
                    scoreDisplay.innerHTML = `${newScore} 💖`;

                    // Resort scoreboard
                    const scoreList = document.getElementById('scoreList');
                    const items = Array.from(scoreList.children);
                    
                    // Update position
                    for (let i = 0; i < items.length; i++) {
                        const score = parseInt(items[i].querySelector('.player-score').getAttribute('data-score')) || 0;
                        if (score < newScore && items[i] !== scoreElement) {
                            scoreList.insertBefore(scoreElement, items[i]);
                            break;
                        }
                    }

                    // Update ranks
                    items.forEach((item, index) => {
                        const rankElement = item.querySelector('.player-rank');
                        const trophies = ['🥇', '🥈', '🥉'];
                        rankElement.textContent = index < 3 ? trophies[index] : (index + 1);
                        item.classList.toggle('top-three', index < 3);
                    });
                });

                // Check for milestone
                showMilestoneCelebration(newScore);

                // Update Firebase
                playersRef.child(userKey).update({
                    hearts: newScore,
                    lastUpdate: firebase.database.ServerValue.TIMESTAMP
                }).catch(error => {
                    console.error("Error updating score:", error);
                });
            }
        }

        // Clean up old clicks
        clickBuffer = clickBuffer.filter(click => 
            currentTime - click.timestamp > RATE_LIMIT_INTERVAL
        );
    }

    // Update the handleSuspiciousActivity function to be more strict
    function handleSuspiciousActivity(userId, currentScore, increment) {
        console.warn(`Suspicious activity detected for ${userId}: +${increment} points`);
        
        // Immediately remove the cheating player
        const updates = {
            [`players/${userId}`]: null,  // Delete the player
            [`hearts`]: null  // Delete all their hearts
        };
        
        // Remove from local tracking
        playerScores.delete(userId);
        suspiciousActivity.delete(userId);
        
        // If this is the current player, show message and reload
        if (userId === userKey) {
            alert('Suspicious activity detected. Your session has been terminated.');
            window.location.reload();
            return;
        }
        
        // Execute the removal
        db.ref().update(updates).then(() => {
            console.log(`Player ${userId} has been removed for cheating`);
        }).catch(error => {
            console.error("Error removing cheater:", error);
        });
    }

    // Update the updateScoreboard function to include data attributes
    function updateScoreboard(snapshot) {
        const scoreList = document.getElementById('scoreList');
        const players = [];
        
        snapshot.forEach(child => {
            const playerData = child.val();
            if (playerData && playerData.name && typeof playerData.hearts === 'number') {
                const lastSeen = playerData.lastSeen || playerData.timestamp || 0;
                const timeSinceLastSeen = Date.now() - lastSeen;
                if (timeSinceLastSeen < 24 * 60 * 60 * 1000) {
                    players.push({
                        name: playerData.name,
                        hearts: playerData.hearts,
                        lastUpdate: playerData.lastUpdate || 0,
                        online: playerData.online || false,
                        lastSeen: lastSeen
                    });
                }
            }
        });
        
        players.sort((a, b) => b.hearts - a.hearts);
        
        const trophies = ['🥇', '🥈', '🥉'];
        scoreList.innerHTML = players.map((player, index) => {
            const timeSinceLastSeen = Date.now() - player.lastSeen;
            const isRecent = timeSinceLastSeen < 5 * 60 * 1000;
            
            return `
                <div class="score-item ${index < 3 ? 'top-three' : ''}" 
                     data-player="${player.name}"
                     title="${player.name}: ${player.hearts} hearts${!player.online ? '\nOffline' : ''}"
                     data-last-seen="${player.lastSeen}">
                    <span class="player-rank">${index < 3 ? trophies[index] : (index + 1)}</span>
                    <span class="player-name">${player.name}</span>
                    <span class="player-score" data-score="${player.hearts}">${player.hearts} 💖</span>
                    <span class="online-indicator" style="color: ${player.online ? '#4CAF50' : (isRecent ? '#FFA500' : '#ccc')}">●</span>
                </div>
            `;
        }).join('');
    }

    // Add this to initialize the scoring system
    function initializeScoring() {
        showNamePrompt();
        
        playersRef.on('value', (snapshot) => {
            updateScoreboard(snapshot);
        }, (error) => {
            console.error("Error fetching scores:", error);
        });
    }

    // Call this after Firebase initialization
    initializeScoring();

    // Optimize the heart display function
    function displayHeart(xRatio, yRatio) {
        const container = document.getElementById('hearts-container');
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerText = '💖';
        
        heart.style.cssText = `
            left: ${xRatio * 100}%;
            top: ${yRatio * 100}%;
        `;

        container.appendChild(heart);
        
        // Remove heart element after animation
        setTimeout(() => {
            heart.classList.add('fade-out');
            setTimeout(() => heart.remove(), 500);
        }, 3500);
    }

    // Add cleanup for old hearts periodically
    setInterval(() => {
        heartsRef.once('value')
            .then((snapshot) => {
                const heartCount = snapshot.numChildren();
                if (heartCount > MAX_HEARTS) {
                    const deleteCount = heartCount - MAX_HEARTS;
                    heartsRef.orderByChild('timestamp')
                        .limitToFirst(deleteCount)
                        .once('value')
                        .then((oldSnapshot) => {
                            const updates = {};
                            oldSnapshot.forEach((child) => {
                                updates[child.key] = null;
                            });
                            heartsRef.update(updates);
                        });
                }
            });
    }, 60000); // Check every minute

    // Add these event listeners
    wishButton.addEventListener('click', () => {
        wishForm.show();
    });

    closeFormButton.addEventListener('click', () => {
        wishForm.hide();
    });

    // Add window online/offline event handlers
    window.addEventListener('online', () => {
        console.log('Browser went online');
        reconnectToFirebase();
    });

    window.addEventListener('offline', () => {
        console.log('Browser went offline');
        cleanup();

        const namePrompt = document.getElementById('namePromptContainer');

        const nameError = document.getElementById('nameError');

        // First try to load existing player data

            function handleNameSubmit() {
                const validation = validateName(playerNameInput.value);
                if (!validation.valid) {
                    nameError.textContent = validation.message;
                    return;
                }

                // Check for existing names (case-insensitive)
                playersRef.once('value')
                    .then(snapshot => {
                        let nameExists = false;
                        snapshot.forEach(child => {
                            const existingPlayer = child.val();
                            if (existingPlayer && existingPlayer.name && 
                                existingPlayer.name.toLowerCase() === validation.sanitizedName.toLowerCase()) {
                                nameExists = true;
                                return true; // Break the forEach loop
                            }
                        });

                        if (nameExists) {
                            nameError.textContent = "This name is already taken. Please choose another.";
                            playerNameInput.value = ''; // Clear the input
                            return Promise.reject('Name taken');
                        }

                        playerName = validation.sanitizedName;
                        return playersRef.child(userKey).set({
                            name: playerName,
                            hearts: 0,
                            timestamp: firebase.database.ServerValue.TIMESTAMP,
                            lastSeen: firebase.database.ServerValue.TIMESTAMP,
                            online: true
                        });
                    })
                    .then(() => {
                        if (playerName) {

                            localStorage.setItem('playerHearts', '0');

                        nameError.textContent = "Error saving name. Please try again.";
                    });
            }

    const MAX_WS_RECONNECT_ATTEMPTS = 5;

    function initializeWebSocket() {
        try {
            // Only try to connect WebSocket if we're not in local development
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                console.log('Skipping WebSocket in local development');
                return;
            }

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('WebSocket Connected');
                wsReconnectAttempts = 0;
            };

            ws.onclose = () => {
                console.log('WebSocket Disconnected');
                handleWebSocketDisconnection();
            };

            ws.onerror = (error) => {
                console.error('WebSocket Error:', error);
                // Don't try to reconnect on local development
                if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
                    handleWebSocketDisconnection();
                }
            };
        } catch (error) {
            console.error('Error initializing WebSocket:', error);
        }
    }

    function handleWebSocketMessage(message) {
        switch (message.type) {
            case 'heart_click':
                if (message.data.player !== playerName) {
                    displayHeart(message.data.xRatio, message.data.yRatio);
                }
                break;
                
            case 'score_update':
                updatePlayerScore(message.data);
                break;
                
            case 'player_join':
                handlePlayerJoin(message.data);
                break;
                
            case 'player_leave':
                handlePlayerLeave(message.data);
                break;
                
            case 'wish':
                displayWish(message.data);
                break;
        }
    }

    function handleWebSocketDisconnection() {
        if (wsReconnectAttempts >= MAX_WS_RECONNECT_ATTEMPTS) {
            console.error('Max WebSocket reconnection attempts reached');
            alert('Connection lost. Please refresh the page.');
            return;
        }

        wsReconnectAttempts++;
        const delay = Math.min(1000 * Math.pow(2, wsReconnectAttempts), 10000);
        
        console.log(`Attempting to reconnect WebSocket in ${delay}ms... (Attempt ${wsReconnectAttempts})`);
        setTimeout(initializeWebSocket, delay);
    }

        clickBuffer = clickBuffer.filter(click => 
            currentTime - click.timestamp > RATE_LIMIT_INTERVAL

    // Add player-specific click processing
    function processPlayerClickBuffer(playerKey) {
        if (!window.playerClickBuffers?.has(playerKey)) {
            if (window.playerProcessingIntervals?.has(playerKey)) {
                clearInterval(window.playerProcessingIntervals.get(playerKey));
                window.playerProcessingIntervals.delete(playerKey);
            }
            return;
        }

        const buffer = window.playerClickBuffers.get(playerKey);
        const currentTime = Date.now();
        
        // Process clicks in batches
        const validClicks = buffer.filter(click => 
            currentTime - click.timestamp <= RATE_LIMIT_INTERVAL
        ).slice(0, MAX_CLICKS_PER_INTERVAL);

        if (validClicks.length > 0) {
            const scoreElement = document.querySelector(`.score-item[data-player="${playerName}"]`);
            if (scoreElement) {
                const scoreDisplay = scoreElement.querySelector('.player-score');
                const currentScore = parseInt(scoreDisplay.getAttribute('data-score') || '0');
                const newScore = currentScore + validClicks.length;

                // Update UI instantly
                requestAnimationFrame(() => {
                    scoreDisplay.setAttribute('data-score', newScore);
                    scoreDisplay.innerHTML = `${newScore} 💖`;
                    updateScoreboardPosition(scoreElement, newScore);
                });

                // Check for milestone
                showMilestoneCelebration(newScore);

                // Batch update to Firebase
                playersRef.child(playerKey).update({
                    hearts: newScore,
                    lastUpdate: firebase.database.ServerValue.TIMESTAMP,
                    clickCount: firebase.database.ServerValue.increment(validClicks.length)
                }).catch(error => {
                    console.error("Error updating score:", error);
                });
            }
        }

        // Clean up old clicks
        window.playerClickBuffers.set(playerKey, 
            buffer.filter(click => currentTime - click.timestamp <= RATE_LIMIT_INTERVAL)
        );

        // Clear interval if buffer is empty
        if (window.playerClickBuffers.get(playerKey).length === 0) {
            clearInterval(window.playerProcessingIntervals.get(playerKey));
            window.playerProcessingIntervals.delete(playerKey);
            window.playerClickBuffers.delete(playerKey);
        }
    }
