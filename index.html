<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher's Day Poster</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="poster-container">
        <img id="poster" src="poster.jpg" alt="Teacher's Day Poster">
        <div id="hearts-container"></div>
        <div id="wishes-container"></div>
    </div>
    <button id="wishButton">Send a Wish</button>

    <!-- Popup form container -->
    <div id="wishFormContainer" class="wish-form-container" style="display: none;">
        <div class="wish-form">
            <h2>Send Your Wish</h2>
            <input type="text" id="nameInput" placeholder="Your Name" required>
            <input type="text" id="wishInput" placeholder="Your Wish" required>
            <button id="submitWishButton">Submit Wish</button>
            <button id="closeFormButton">Close</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-database-compat.js"></script>

    <script>
        let offensiveWords = [];

        const firebaseConfig = {
            apiKey: "AIzaSyBinhf3-PpbAeQaQKToNnLHBBBxVQeLbp4",
            authDomain: "yayy-93c45.firebaseapp.com",
            databaseURL: "https://yayy-93c45-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yayy-93c45",
            storageBucket: "yayy-93c45.appspot.com",
            messagingSenderId: "281901593072",
            appId: "1:281901593072:web:614dff92e64d25669c6d35",
            measurementId: "G-JB3PWXQ56M"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Fetch the list of offensive words
        fetch("https://raw.githubusercontent.com/logm1lo/logm1lo.github.io/main/vn_offensive_words_other_formats.txt")
            .then(response => response.text())
            .then(text => {
                offensiveWords = text.split(";")
                    .map(word => word.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim())
                    .filter(word => word !== "");
            })
            .catch(error => {
                console.error("Error fetching offensive words:", error);
            });

        // Show form when "Send a Wish" button is clicked
        document.getElementById("wishButton").addEventListener("click", () => {
            document.getElementById("wishFormContainer").style.display = "flex";
        });

        // Close form when "Close" button is clicked
        document.getElementById("closeFormButton").addEventListener("click", () => {
            document.getElementById("wishFormContainer").style.display = "none";
        });

        // Submit wish and close form
        document.getElementById("submitWishButton").addEventListener("click", () => {
            const name = document.getElementById("nameInput").value.trim();
            const wish = document.getElementById("wishInput").value.trim();

            if (name && wish) {
                if (containsOffensiveWords(wish)) {
                    alert("Your wish contains inappropriate content. Please edit and try again.");
                    return;
                }

                const wishData = {
                    name,
                    text: wish,
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight
                };

                db.ref("wishes").push(wishData);
                displayWish(wishData);
                document.getElementById("wishFormContainer").style.display = "none";
            } else {
                alert("Please enter both your name and your wish.");
            }
        });

        // Function to check if the wish contains offensive words
        function containsOffensiveWords(wishText) {
            // Normalize and convert each offensive word to lowercase
            offensiveWords = offensiveWords.map(word => word.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""));
            
            // Normalize and convert wishText to lowercase, then split into words ignoring punctuation
            const words = wishText.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").match(/\b\w+\b/g) || [];

            // Check each word in wishText against offensiveWords
            for (let word of words) {
                if (offensiveWords.includes(word)) {
                    console.log(`Offensive word found: ${word}`); // Debugging line
                    return true;
                }
            }
            return false;
        }

        function displayWish(wishData) {
            const wishContainer = document.getElementById("wishes-container");
            const wishElement = document.createElement("div");
            wishElement.className = "wish";
            const padding = 20;

            const poster = document.getElementById("poster");
            const posterWidth = poster.offsetWidth;
            const posterHeight = poster.offsetHeight;

            const posX = Math.random() * (posterWidth - padding * 2) + padding;
            const posY = Math.random() * (posterHeight - padding * 2) + padding;

            wishElement.style.top = `${posY}px`;
            wishElement.style.left = `${posX}px`;
            wishElement.innerText = `${wishData.name}: ${wishData.text}`;
            wishContainer.appendChild(wishElement);
        }

        db.ref("wishes").on("child_added", (snapshot) => {
            const wishData = snapshot.val();
            displayWish(wishData);
        });

        document.addEventListener('click', function(event) {
            const poster = document.querySelector('.poster-container');
            const rect = poster.getBoundingClientRect();
            const mouseX = event.clientX - rect.left;
            const mouseY = event.clientY - rect.top;

            if (mouseX >= 0 && mouseX <= rect.width && mouseY >= 0 && mouseY <= rect.height) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerText = '💖';
                heart.style.left = `${mouseX - 15}px`;
                heart.style.top = `${mouseY - 15}px`;

                document.getElementById('hearts-container').appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, 4000);
            }
        });
    </script>
</body>
</html>
